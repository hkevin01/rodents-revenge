name: Build & Deploy to GitHub Pages

on:
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches: [main]          # also auto-build on every push to main

permissions:
  contents: write             # needed to push the gh-pages branch

jobs:
  build-and-deploy:
    name: Build (pygbag → WebAssembly) and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build WebAssembly bundle
        # --build skips the local test server; output goes to build/web/
        run: python -m pygbag --build src/rodents_revenge

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/web
          clean: true
