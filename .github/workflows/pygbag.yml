name: Build & Deploy to GitHub Pages

on:
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches: [main]          # also auto-build on every push to main

permissions:
  contents: write             # needed to push the gh-pages branch

jobs:
  build-and-deploy:
    name: Build (pygbag → WebAssembly) and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build WebAssembly bundle
        # Build from a versioned copy of the source folder so pygbag names
        # ALL internal archive references with the git sha — no renaming needed.
        # This ensures browsers can never serve a stale cached .tar.gz.
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          VERSIONED="rodents_revenge_${SHORT_SHA}"
          cp -r src/rodents_revenge "/tmp/${VERSIONED}"
          python -m pygbag --build "/tmp/${VERSIONED}"
          # Move output back to expected location for subsequent steps
          mkdir -p src/rodents_revenge/build
          cp -r "/tmp/${VERSIONED}/build/web" src/rodents_revenge/build/web

      - name: Sanitize generated index.html for browser compatibility
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path

          index_path = Path("src/rodents_revenge/build/web/index.html")
          html = index_path.read_text(encoding="utf-8")

          # Remove deprecated/unsupported iframe permissions that trigger console warnings.
          html = html.replace("; monetization", "")
          html = html.replace("; xr;", ";")
          html = html.replace("; xr-spatial-tracking", "")
          html = re.sub(r"\s*xr-spatial-tracking;?", "", html)

          # Remove duplicate fullscreen attributes since allow=fullscreen already exists.
          html = re.sub(
              r'^\s*(?:allowfullscreen|webkitallowfullscreen|msallowfullscreen|mozallowfullscreen)="true"\s*\n',
              "",
              html,
              flags=re.MULTILINE,
          )

          # Remove sandbox warning from about:blank iframe.
          html = html.replace(
              'sandbox="allow-same-origin allow-top-navigation allow-scripts allow-pointer-lock"',
              'sandbox="allow-top-navigation allow-scripts allow-pointer-lock"',
          )

          # Avoid loading the remote empty iframe page (and its noisy policy headers).
          html = html.replace(
              'src="https://pygame-web.github.io/cdn/0.9.3/empty.html"',
              'src="about:blank"',
          )

          # Reduce template debug noise in browser console.
          html = re.sub(r'gui_debug\s*:\s*\d+,', 'gui_debug : 0,', html)
          html = html.replace('data-os="vtx,snd,gui"', 'data-os="snd,gui"')
          html = html.replace('xtermjs : "1" ,', 'xtermjs : "0" ,')
          html = re.sub(r'quiet\s*:\s*false,', 'quiet : true,', html)

          # Replace template TODO warning with real resize behavior.
          html = html.replace(
              '    globalThis.__canvas_resized = (self, ecw, ech) => {\n        console.warn("TODO: panda3d canvas monitor", self, ecw, ech)\n    }',
              '    globalThis.__canvas_resized = (self, ecw, ech) => {\n        if (!self || !self.canvas) return\n        self.canvas.style.width = `${ecw}px`\n        self.canvas.style.height = `${ech}px`\n    }',
          )

          short_sha = os.environ.get("SHORT_SHA", "?")
          print(f"Sanitized index.html for build {short_sha}")
          index_path.write_text(html, encoding="utf-8")
          PY

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          # pygbag writes output into the app folder, not repo root
          folder: src/rodents_revenge/build/web
          clean: true
