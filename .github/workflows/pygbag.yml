name: Build & Deploy to GitHub Pages

on:
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches: [main]          # also auto-build on every push to main

permissions:
  contents: write             # needed to push the gh-pages branch

jobs:
  build-and-deploy:
    name: Build (pygbag → WebAssembly) and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build WebAssembly bundle
        # Build from a versioned copy of the source folder so pygbag names
        # ALL internal archive references with the git sha — no renaming needed.
        # This ensures browsers can never serve a stale cached .tar.gz.
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          VERSIONED="rodents_revenge_${SHORT_SHA}"
          cp -r src/rodents_revenge "/tmp/${VERSIONED}"
          python -m pygbag --build "/tmp/${VERSIONED}"
          # Move output back to expected location for subsequent steps
          mkdir -p src/rodents_revenge/build
          cp -r "/tmp/${VERSIONED}/build/web" src/rodents_revenge/build/web

      - name: Sanitize generated index.html for browser compatibility
        run: |
          python - <<'PY'
          import os, re
          from pathlib import Path

          index_path = Path("src/rodents_revenge/build/web/index.html")
          html = index_path.read_text(encoding="utf-8")

          # Remove deprecated/unsupported iframe permissions that trigger console warnings.
          html = html.replace("; monetization", "")
          html = html.replace("; xr;", ";")
          html = html.replace("; xr-spatial-tracking", "")
          html = re.sub(r"\s*xr-spatial-tracking;?", "", html)

          # Remove duplicate fullscreen attributes since allow=fullscreen already exists.
          html = re.sub(
              r'^\s*(?:allowfullscreen|webkitallowfullscreen|msallowfullscreen|mozallowfullscreen)="true"\s*\n',
              "",
              html,
              flags=re.MULTILINE,
          )

          # Remove sandbox warning from about:blank iframe.
          html = html.replace(
              'sandbox="allow-same-origin allow-top-navigation allow-scripts allow-pointer-lock"',
              'sandbox="allow-top-navigation allow-scripts allow-pointer-lock"',
          )

          # Avoid loading the remote empty iframe page (and its noisy policy headers).
          html = html.replace(
              'src="https://pygame-web.github.io/cdn/0.9.3/empty.html"',
              'src="about:blank"',
          )

          # Reduce template debug noise in browser console.
          html = re.sub(r'gui_debug\s*:\s*\d+,', 'gui_debug : 0,', html)
          html = html.replace('data-os="vtx,snd,gui"', 'data-os="snd,gui"')
          html = html.replace('xtermjs : "1" ,', 'xtermjs : "0" ,')
          html = re.sub(r'quiet\s*:\s*false,', 'quiet : true,', html)

          # Replace template TODO warning with real resize behavior.
          html = html.replace(
              '    globalThis.__canvas_resized = (self, ecw, ech) => {\n        console.warn("TODO: panda3d canvas monitor", self, ecw, ech)\n    }',
              '    globalThis.__canvas_resized = (self, ecw, ech) => {\n        if (!self || !self.canvas) return\n        self.canvas.style.width = `${ecw}px`\n        self.canvas.style.height = `${ech}px`\n    }',
          )

            # Brand and polish pygbag loading copy.
          html = html.replace("Loading, please wait ...", "Loading Rodent Rumble...")
          html = html.replace("Downloading...", "Preparing game files...")
            # Remove the first-touch gate so load always proceeds directly to menu.
            html = re.sub(
              r'\n\s*# test/wait user media interaction\n\s*if not platform\.window\.MM\.UME:\n.*?\n\s*while not platform\.window\.MM\.UME:\n\s*await asyncio\.sleep\(\.1\)\n',
              '\n    # Auto-unlock media and skip the tap-to-start overlay.\n    try:\n        platform.window.eval("if (window.MM) window.MM.UME = true")\n        platform.window.infobox.style.display = "none"\n    except Exception:\n        pass\n',
              html,
              flags=re.S,
            )

          # Inject a cleaner loader style without changing pygbag behavior.
          polished_loader_css = """
          /* Rodent Rumble loader polish */
          :root {
            --rr-bg: radial-gradient(circle at 20% 15%, #2f2617 0%, #18130c 45%, #090806 100%);
            --rr-panel: rgba(16, 13, 9, 0.86);
            --rr-panel-border: rgba(210, 176, 84, 0.5);
            --rr-gold: #f0cf7a;
            --rr-muted: #cdb989;
            --rr-track: rgba(255, 255, 255, 0.12);
            --rr-fill: linear-gradient(90deg, #5cc37a 0%, #99db7d 100%);
          }

          body {
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: var(--rr-bg) !important;
            color: var(--rr-muted);
          }

          #transfer {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(88vw, 560px);
            padding: 20px 22px 18px;
            border-radius: 14px;
            border: 1px solid var(--rr-panel-border);
            background: var(--rr-panel);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(3px);
            z-index: 8;
            pointer-events: none;
          }

          #status {
            margin: 0 0 12px;
            display: block;
            color: var(--rr-gold);
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.02em;
            text-align: center;
          }

          #progress {
            width: 100%;
            height: 14px;
            border: none;
            border-radius: 999px;
            overflow: hidden;
            background: var(--rr-track);
          }

          #progress::-webkit-progress-bar {
            background: var(--rr-track);
            border-radius: 999px;
          }

          #progress::-webkit-progress-value {
            background: var(--rr-fill);
            border-radius: 999px;
          }

          #progress::-moz-progress-bar {
            background: var(--rr-fill);
            border-radius: 999px;
          }

          #infobox {
            position: fixed;
            inset: 0;
            width: 100vw;
            min-height: 100vh;
            background: rgba(10, 8, 6, 0.16) !important;
            color: #e8d7ac !important;
            font-size: 15px;
            font-weight: 700;
            display: grid;
            place-items: center;
            text-align: center;
            white-space: pre-line;
            letter-spacing: 0.02em;
            z-index: 9999;
            pointer-events: auto;
            padding: 0;
          }

          .rr-start-hit {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            padding: 18px;
            box-sizing: border-box;
          }

          .rr-start-card {
            width: min(96vw, 820px);
            min-height: 210px;
            background: rgba(10, 8, 6, 0.9);
            border: 1px solid rgba(210, 176, 84, 0.38);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            padding: 18px 18px 16px;
            display: grid;
            place-items: center;
          }

          .rr-start-icon {
            font-size: 34px;
            line-height: 1;
            margin-bottom: 6px;
          }

          .rr-start-title {
            color: var(--rr-gold);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 8px;
          }

          .rr-start-cta {
            color: #eadcb5;
            font-size: 16px;
            font-weight: 700;
            pointer-events: none;
          }

          .rr-start-card,
          .rr-start-title,
          .rr-start-icon {
            pointer-events: none;
          }

          #infobox,
          .rr-start-hit,
          .rr-start-card,
          .rr-start-cta,
          .rr-start-title,
          .rr-start-icon {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
          }

          @media (orientation: landscape) {
            #transfer {
              top: 52%;
              width: min(74vw, 640px);
            }

            .rr-start-card {
              width: min(90vw, 920px);
            }
          }
          """
          if "Rodent Rumble loader polish" not in html:
              html = html.replace("</style>", f"\n{polished_loader_css}\n</style>", 1)

          # Add a resilient mobile unlock hook that does not rely on a specific
          # upstream template snippet. Any first gesture should dismiss infobox
          # and mark media engagement as unlocked.
          unlock_script = """
          <script>
          (() => {
            if (window.__rrUnlockBound) return;
            window.__rrUnlockBound = true;

            const unlock = () => {
              try {
                if (window.MM) window.MM.UME = true;
              } catch (_) {}
              const box = document.getElementById("infobox");
              if (box) box.style.display = "none";
            };

            const opts = { passive: true, capture: true };
            ["pointerdown", "touchstart", "touchend", "mousedown", "mouseup", "click"].forEach((ev) => {
              window.addEventListener(ev, unlock, opts);
              document.addEventListener(ev, unlock, opts);
            });
          })();
          </script>
          """
          if "window.__rrUnlockBound" not in html:
              html = html.replace("</body>", f"\n{unlock_script}\n</body>", 1)

          short_sha = os.environ.get("SHORT_SHA", "?")
          print(f"Sanitized index.html for build {short_sha}")
          index_path.write_text(html, encoding="utf-8")
          PY

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          # pygbag writes output into the app folder, not repo root
          folder: src/rodents_revenge/build/web
          clean: true
