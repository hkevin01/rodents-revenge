name: Build & Deploy to GitHub Pages

on:
  workflow_dispatch:          # run manually from the Actions tab
  push:
    branches: [main]          # also auto-build on every push to main

permissions:
  contents: write             # needed to push the gh-pages branch

jobs:
  build-and-deploy:
    name: Build (pygbag → WebAssembly) and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build WebAssembly bundle
        # --build skips the local test server; output goes to build/web/
        run: python -m pygbag --build src/rodents_revenge

      - name: Sanitize generated index.html for browser compatibility
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path("src/rodents_revenge/build/web/index.html")
          html = index_path.read_text(encoding="utf-8")

          # Remove deprecated/unsupported iframe permissions that trigger console warnings.
          html = html.replace("; monetization", "")
          html = html.replace("; xr;", ";")

          # Remove duplicate fullscreen attributes since allow=fullscreen already exists.
            html = re.sub(
              r'^\s*(?:allowfullscreen|webkitallowfullscreen|msallowfullscreen|mozallowfullscreen)="true"\s*\n',
              "",
              html,
              flags=re.MULTILINE,
            )

          # Avoid loading the remote empty iframe page (and its noisy policy headers).
          html = html.replace(
              'src="https://pygame-web.github.io/cdn/0.9.3/empty.html"',
              'src="about:blank"',
          )

          # Reduce template debug noise in browser console.
          html = html.replace('gui_debug : 2,', 'gui_debug : 0,')
          html = html.replace('data-os="vtx,snd,gui"', 'data-os="snd,gui"')
          html = html.replace('xtermjs : "1" ,', 'xtermjs : "0" ,')

          index_path.write_text(html, encoding="utf-8")
          PY

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          # pygbag writes output into the app folder, not repo root
          folder: src/rodents_revenge/build/web
          clean: true
