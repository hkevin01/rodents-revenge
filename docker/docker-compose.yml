services:
  game:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /app
    command: python -m rodents_revenge.main
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ..:/app

  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    working_dir: /app
    command: python -m pytest -q
    environment:
      PYTHONPATH: /app/src
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy
    volumes:
      - ..:/app
