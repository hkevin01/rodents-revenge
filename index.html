async def custom_site():
    import embed
    platform.document.body.style.background = "#7f7f7f"

    bundle = "rodents_revenge_277c0b3"

    appdir.mkdir()


    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("rodents_revenge_277c0b3.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("rodents_revenge_277c0b3.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    <script type="application/javascript">

    globalThis.__canvas_resized = (self, ecw, ech) => {
        if (!self || !self.canvas) return
        const vw = window.innerWidth; const vh = window.innerHeight
        const scale = Math.min(vw / ecw, vh / ech)
        const w = Math.round(ecw * scale); const h = Math.round(ech * scale)
        self.canvas.style.width = w + "px"
        self.canvas.style.height = h + "px"
        self.canvas.style.position = "fixed"
        self.canvas.style.left = Math.max(0, Math.round((vw - w) / 2)) + "px"
        self.canvas.style.top = Math.max(0, Math.round((vh - h) / 2)) + "px"
    }

<script>
(() => {
  if (window.__rrUnlockBound) return;
  window.__rrUnlockBound = true;

  const unlock = () => {
    try {
      if (window.MM) window.MM.UME = true;
    } catch (_) {}
    const box = document.getElementById("infobox");
    if (box) box.style.display = "none";
  };

  const opts = { passive: true, capture: true };
  ["pointerdown", "touchstart", "touchend", "mousedown", "mouseup", "click"].forEach((ev) => {
    window.addEventListener(ev, unlock, opts);
    document.addEventListener(ev, unlock, opts);
  });
})();
</script>



<script>
(() => {
  if (window.__rrResizeBound) return;
  window.__rrResizeBound = true;
  function rrFitCanvas() {
    const c = document.querySelector("canvas");
    if (!c || !c.width || !c.height) return;
    const vw = window.innerWidth, vh = window.innerHeight;
    const scale = Math.min(vw / c.width, vh / c.height);
    const w = Math.round(c.width * scale);
    const h = Math.round(c.height * scale);
    c.style.width = w + "px";
    c.style.height = h + "px";
    c.style.position = "fixed";
    c.style.left = Math.max(0, Math.round((vw - w) / 2)) + "px";
    c.style.top = Math.max(0, Math.round((vh - h) / 2)) + "px";
  }
  window.addEventListener("resize", rrFitCanvas);
  setTimeout(rrFitCanvas, 500);
  setTimeout(rrFitCanvas, 2000);
})();
</script>
